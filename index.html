<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sunny Bites</title>
  </head>

  <body>
    <header>
      <h1>Sunny Bites</h1>

      <nav>
        <a href="#">Home</a>
        <a href="#about">About</a>
        <a href="#menu">Menu</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <section class="hero">
      <h2>Fresh Food, Happy Mood</h2>
      <p>Welcome to Sunny Bites Restaurant.</p>
      <a class="btn" href="#menu">View Menu</a>
    </section>

    <section id="about">
      <h2>About Us</h2>
      <p>We serve fresh and tasty meals every day.</p>
    </section>

    <section id="menu">
      <h2>Popular Dishes</h2>

      <div class="cards">
        <div class="card">
          <h3>Burger</h3>
          <p>$8</p>
        </div>

        <div class="card">
          <h3>Pizza</h3>
          <p>$10</p>
        </div>

        <div class="card">
          <h3>Pasta</h3>
          <p>$9</p>
        </div>
      </div>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <p>Email: hello@sunnybites.com</p>
    </section>

    <footer>
      <p>© 2026 Sunny Bites</p>
    </footer>

</html>
